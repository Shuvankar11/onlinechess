<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Multiplayer Chess</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <div id="main-menu" class="screen-container">
            <h1>Chess King</h1>
            <button class="main-btn" onclick="startFlow('local')">Pass & Play</button>
            <button class="main-btn" onclick="startFlow('computer')">Vs Computer</button>
            <button class="main-btn" onclick="startFlow('multiplayer')" style="background: linear-gradient(135deg, #FF9800, #F57C00);">Online Multiplayer</button>
        </div>

        <div id="color-select" class="screen-container" style="display: none;">
            <h1>Pick Your Side</h1>
            <div class="color-options">
                <div class="color-btn white-choice" onclick="selectColor('white')">White</div>
                <div class="color-btn black-choice" onclick="selectColor('black')">Black</div>
            </div>
        </div>

        <div id="multiplayer-menu" class="screen-container" style="display: none;">
            <h2>Online Mode</h2>
            
            <div style="margin-bottom: 15px; text-align: center;">
                <label style="color: #ccc; font-size: 0.9rem;">I want to play as:</label><br>
                <select id="host-color" style="padding: 8px 20px; border-radius: 8px; background: #2a2a2a; color: white; border: 2px solid #555; font-size: 1rem; margin-top: 5px; outline: none; cursor: pointer;">
                    <option value="white">White</option>
                    <option value="black">Black</option>
                </select>
            </div>

            <button class="main-btn" onclick="createRoom()">Create New Room</button>
            
            <h3 style="margin: 20px 0; color: #888;">OR</h3>
            
            <input type="number" id="room-id-input" placeholder="Enter Room Code" autocomplete="off">
            <button class="main-btn" onclick="joinRoom()" style="background: linear-gradient(135deg, #2196F3, #1976D2);">Join Room</button>
            
            <p id="room-status" style="margin-top:20px; font-weight:bold; color:#FFEB3B; font-size:1.1rem; text-align: center;"></p>
            <button onclick="goBack()" style="margin-top:30px; background:none; border:none; color:#ff5252; font-size:1.1rem; cursor:pointer;">Cancel</button>
        </div>

        <div id="game-screen" style="display: none; width: 100%;">
            <div class="header">
                <button onclick="goBack()" id="back-btn">⬅ Quit</button>
                <div style="flex-grow:1;">
                    <h2 id="mode-title">Play Chess</h2>
                    <p id="status">White to move</p>
                    <p id="room-display" style="font-size: 0.8rem; color: #aaa; margin-top: 2px;"></p>
                </div>
            </div>
            <div id="myBoard" style="width: 100%; max-width: 400px; margin: 0 auto; aspect-ratio: 1 / 1;"></div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="script.js"></script>
</body>
</html>
